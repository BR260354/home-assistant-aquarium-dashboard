type: custom:mushroom-chips-card
alignment: center
card_mod:
  style: |
    ha-card {
      background: transparent !important;
      box-shadow: none !important;
      padding: 0 4px;

      /* global chip sizing */
      --chip-height: 30px;
      --chip-icon-size: 20px;
      --chip-font-size: 0.8rem;
    }

    ha-card .chip-container {
      gap: 8px;
      justify-content: center;
      align-items: center;
    }

    ha-card mushroom-chip .chip {
      border-radius: 999px !important;
    }
chips:
  - type: template
    entity: sensor.aquarium_hydros_display_temp
    icon: mdi:thermometer
    content: Display {{ states('sensor.aquarium_hydros_display_temp') | round(2)  }}
    tap_action:
      action: more-info
    card_mod:
      style: |
        :host {
          {% set n = states('sensor.aquarium_hydros_display_temp')|float %}
          --chip-background:
            {% if n < 77 %}
              rgba(110, 205, 219, 0.4)   /* Low - Blue*/
            {% elif n < 78 %}
              rgba(158, 203, 145, 0.4) /* Good - Green */
            {% elif n < 78.9 %}
              rgba(246, 243, 169, 0.4) /* Warning - Yellow */
            {% else %}
               rgba(194, 89, 100, 0.4) /* HIGH - Red */
            {% endif %};
          --color:
            {% if n > 0 %}
              var(--primary-text-color)
            {% else %}
              var(--disabled-text-color)
            {% endif %};
        }
  - type: template
    entity: sensor.aquarium_hydros_ph_ii
    icon: mdi:fish
    content: pH {{ states('sensor.aquarium_hydros_ph_ii') | round(2) }}
    tap_action:
      action: more-info
    card_mod:
      style: |
        :host {
          {% set n = states('sensor.aquarium_hydros_ph_ii')|float %}
          --chip-background:
            {% if n < 7.7 %}
              rgba(194, 89, 100, 0.4)   /* Too low - Red */
            {% elif n < 8.5 %}
              rgba(158, 203, 145, 0.4)  /* Good */
            {% else %}
               rgba(255, 179, 71, 0.4)  /* Too high - Orange */
            {% endif %};
          --color:
            {% if n > 0 %}
              var(--primary-text-color)
            {% else %}
              var(--disabled-text-color)
            {% endif %};
        }
  - type: template
